apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alertlens.fullname" . }}
  labels:
    {{- include "alertlens.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "alertlens.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alertlens.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 35
      serviceAccountName: {{ include "alertlens.fullname" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alertlens
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "slack.existingSecret is required" .Values.slack.existingSecret }}
                  key: bot-token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "slack.existingSecret is required" .Values.slack.existingSecret }}
                  key: app-token
            - name: SLACK_ALERT_CHANNEL
              value: {{ required "slack.alertChannel is required" .Values.slack.alertChannel | quote }}
            - name: ALERTMANAGER_URL
              value: {{ required "alertmanagerURL is required" .Values.alertmanagerURL | quote }}
            - name: HOLMESGPT_URL
              value: {{ required "holmesURL is required" .Values.holmesURL | quote }}
            - name: HOLMES_RESPONSE_LANGUAGE
              value: {{ .Values.holmesResponseLanguage | quote }}
            - name: METRICS_ADDR
              value: :9090
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
