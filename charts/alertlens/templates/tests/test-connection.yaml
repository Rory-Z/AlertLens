apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "alertlens.fullname" . }}-test-connection"
  labels:
    {{- include "alertlens.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      command: ["wget"]
      args: ["-qO-", "http://{{ include "alertlens.fullname" . }}:{{ .Values.service.port }}/healthz"]
