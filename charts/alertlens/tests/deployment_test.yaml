suite: deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders one hardened stateless replica
    set:
      slack.existingSecret: alertlens-slack
      slack.alertChannel: C1
      alertmanagerURL: http://alertmanager:9093
      holmesURL: http://holmes:5050
      holmesResponseLanguage: zh-CN
    asserts:
      - equal:
          path: spec.replicas
          value: 1
      - notExists:
          path: spec.strategy
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 35
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts
      - notExists:
          path: spec.template.spec.volumes
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SLACK_ALERT_CHANNEL
            value: C1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOLMES_RESPONSE_LANGUAGE
            value: zh-CN
