image:
  repository: ghcr.io/rory-z/alertlens
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

slack:
  existingSecret: ""
  alertChannels: []

alertmanagerURL: ""
holmesURL: ""

service:
  port: 9090

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

networkPolicy:
  enabled: true
  # Native NetworkPolicy permits any destination on TCP 443. Use a CNI FQDN
  # policy or egress proxy when strict Slack-only HTTPS is required.
  # Add the namespaces and ports used by Alertmanager and HolmesGPT.
  internalEgress: []
  # - namespace: monitoring
  #   ports: [9093]
