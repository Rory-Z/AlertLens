name: Vulnerability scan

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: golang/govulncheck-action@v1.1.0
        with:
          go-version-file: go.mod
          go-package: ./...
