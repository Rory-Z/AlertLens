name: Version bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: Chart version to release (for example, 0.2.0 or 1.0.0-rc.1)
        required: true
        type: string
      app_version:
        description: AlertLens app version; leave empty to use the chart version
        required: false
        type: string
      create_tag:
        description: Create a tag and start the release workflow
        required: true
        type: boolean
        default: true

permissions:
  actions: write
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ inputs.version }}
      APP_VERSION: ${{ inputs.app_version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Validate versions
        shell: bash
        run: |
          pattern='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$VERSION" =~ $pattern ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          if [[ -n "$APP_VERSION" && ! "$APP_VERSION" =~ $pattern ]]; then
            echo "Invalid app version: $APP_VERSION" >&2
            exit 1
          fi

      - name: Check tag
        if: ${{ inputs.create_tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$VERSION"; then
            echo "Tag $VERSION already exists" >&2
            exit 1
          fi

      - name: Update chart
        shell: bash
        run: |
          sed -i -E "s/^version:.*/version: $VERSION/" charts/alertlens/Chart.yaml
          sed -i -E "s/^appVersion:.*/appVersion: \"${APP_VERSION:-$VERSION}\"/" charts/alertlens/Chart.yaml
          cat charts/alertlens/Chart.yaml

      - name: Commit version bump
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add charts/alertlens/Chart.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to $VERSION"
            git push
          fi

      - name: Create tag
        if: ${{ inputs.create_tag }}
        run: |
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Start release
        if: ${{ inputs.create_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yaml --ref "$VERSION"
