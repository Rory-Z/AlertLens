name: Version bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: Chart version to release (for example, 0.2.0 or 1.0.0-rc.1)
        required: true
        type: string
      create_tag:
        description: Create a tag and start the Docker and release workflows
        required: true
        type: boolean
        default: true

permissions:
  actions: write
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$VERSION" =~ $pattern || ( "$VERSION" == *-* && ".${VERSION#*-}." =~ \.0[0-9]+\. ) ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

      - name: Check tag
        if: ${{ inputs.create_tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/v$VERSION"; then
            echo "Tag v$VERSION already exists" >&2
            exit 1
          fi

      - name: Update chart
        run: |
          sed -i -E "s/^version:.*/version: $VERSION/" charts/alertlens/Chart.yaml
          sed -i -E "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/alertlens/Chart.yaml
          cat charts/alertlens/Chart.yaml

      - name: Commit version bump
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add charts/alertlens/Chart.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to $VERSION"
            git push
          fi

      - name: Create tag
        if: ${{ inputs.create_tag }}
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Start Docker publish
        if: ${{ inputs.create_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docker.yml --ref "v$VERSION"
