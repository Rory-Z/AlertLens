name: Docker

on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Read image metadata
        id: image
        run: |
          echo "name=$(awk '$1 == "repository:" { print $2; exit }' charts/alertlens/values.yaml)" >> "$GITHUB_OUTPUT"
          echo "tag=$(awk '$1 == "appVersion:" { gsub(/\"/, "", $2); print $2; exit }' charts/alertlens/Chart.yaml)" >> "$GITHUB_OUTPUT"
      - name: Verify chart version
        if: ${{ github.ref_type == 'tag' }}
        run: |
          chart_version=$(awk '$1 == "version:" { print $2; exit }' charts/alertlens/Chart.yaml)
          test "$chart_version" = "${GITHUB_REF_NAME#v}"
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.image.outputs.tag }},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
      - name: Start release
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yaml --ref "$GITHUB_REF_NAME"
