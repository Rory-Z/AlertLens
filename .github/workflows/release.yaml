name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Verify chart version
        run: |
          chart_version=$(awk '$1 == "version:" { print $2; exit }' charts/alertlens/Chart.yaml)
          test "$chart_version" = "${GITHUB_REF_NAME#v}"

      - uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3
      - name: Package Helm chart
        run: |
          mkdir dist
          helm package charts/alertlens --destination dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--generate-notes --verify-tag)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            args+=(--prerelease --latest=false)
          fi
          gh release create "$GITHUB_REF_NAME" dist/*.tgz "${args[@]}"
